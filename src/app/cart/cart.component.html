<!-- cart.component.html -->
<div class="cart-container">
  <h2>Mi Cesta</h2>
  <div *ngIf="items.length === 0">
    <p>Tu carrito está vacío.</p>
  </div>
  
  <div *ngFor="let item of items" class="cart-item">
    <img [src]="item.imagen" alt="{{ item.nombre }}" width="80">
    <div>
      <h4>{{ item.nombre }}</h4>
      <p>Precio: {{ item.precio | currency }}</p>
      <input type="number" [(ngModel)]="item.cantidad" (ngModelChange)="calcularTotal()" min="1">
      <button (click)="eliminarItem(item)">Eliminar</button>
    </div>
  </div>

  <div *ngIf="items.length > 0" class="cart-total">
    <h3>Total: {{ total | currency }}</h3>
    <button (click)="iniciarCompra()">Comprar</button>
  </div>
</div>
