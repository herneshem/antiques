<div *ngIf="producto" class="detalle-card">
  <button (click)="cerrarMuestra()">Cerrar</button>

  <h2>{{ producto.nombre }}</h2>
  <img [src]="producto.imagen" alt="{{ producto.nombre }}">
  <p>{{ producto.descripcion }}</p>
  <p><strong>Categoría:</strong> {{ producto.categoria }}</p>
  <p><strong>Precio:</strong> {{ producto.precio | currency:'USD':'symbol':'1.2-2' }}</p>
</div>
